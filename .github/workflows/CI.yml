# Test + clippy on every push/PR; on a version tag (`vX.Y.Z`) build per-platform binaries and attach
# them to a GitHub Release. crates.io is published manually (`cargo publish` — py-canon then
# find-dup-defs). No secrets needed — the release uses the built-in GITHUB_TOKEN.
name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo test --release
      - run: cargo clippy --release --all-targets

  build:
    name: binary (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/')
    needs: test
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: macos-13,       target: x86_64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # Builds the binary, archives it (.tar.gz on unix / .zip on windows), and uploads to the
      # Release for this tag.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: find-dup-defs
          target: ${{ matrix.target }}
          archive: find-dup-defs-$target
          token: ${{ secrets.GITHUB_TOKEN }}
